<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="0" y="0" width="32" height="32" rx="6" ry="6"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" ry="6" fill="#0f0a1a"/>
  <!-- Waveform bars -->
  <g clip-path="url(#clip)">
    <rect x="3"  y="18" width="3" height="8"  rx="1.5" fill="url(#g)" opacity="0.85"/>
    <rect x="7.5"  y="12" width="3" height="14" rx="1.5" fill="url(#g)" opacity="0.9"/>
    <rect x="12" y="6"  width="3" height="20" rx="1.5" fill="url(#g)"/>
    <rect x="16.5" y="10" width="3" height="16" rx="1.5" fill="url(#g)" opacity="0.95"/>
    <rect x="21" y="4"  width="3" height="22" rx="1.5" fill="url(#g)"/>
    <rect x="25.5" y="13" width="3" height="13" rx="1.5" fill="url(#g)" opacity="0.9"/>
  </g>
</svg>
